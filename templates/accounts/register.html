{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="wrap" style="max-width:460px;margin:60px auto">
  <div class="card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px">Create Account</div>
      <div style="color:var(--muted);font-size:13px">6 free predictions — no credit card needed</div>
    </div>
    <form method="post">{% csrf_token %}
      <div class="field"><label>Email</label><input type="email" name="email" placeholder="you@email.com" required></div>
      <div class="field"><label>First Name (optional)</label><input type="text" name="first_name" placeholder="Your name"></div>
      <div class="field"><label>Password</label><input type="password" name="password1" placeholder="Min 8 characters" required></div>
      <div class="field"><label>Confirm Password</label><input type="password" name="password2" placeholder="Repeat password" required></div>
      {% if form.errors %}<div class="alert alert-error">{{ form.errors }}</div>{% endif %}
      <button type="submit" class="btn btn-green btn-full" style="margin-top:8px">Create Account</button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted)">Already have an account? <a href="/accounts/login/" style="color:var(--accent)">Login</a></div>
  </div>
</div>
{% endblock %}
